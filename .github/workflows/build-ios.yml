name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build unsigned app
        run: |
          cd Chowder
          xcodebuild clean build \
            -project Chowder.xcodeproj \
            -scheme Chowder \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath derived_data \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package into IPA
        run: |
          cd Chowder
          mkdir -p Payload
          mv derived_data/Build/Products/Release-iphoneos/Chowder.app Payload/
          zip -r Chowder.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chowder-ipa
          path: Chowder/Chowder.ipa
